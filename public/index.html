async function loadRecursosHumanos() {
  const lista  = document.getElementById('rrhh-lista');
  if (!lista) return;
  lista.innerHTML = `<div style="color:var(--text-muted)">Cargando…</div>`;

  const fi      = document.getElementById('rrhh-fi')?.value  || '';
  const ff      = document.getElementById('rrhh-ff')?.value  || '';
  const drFil   = document.getElementById('rrhh-driver')?.value || '';
  const tipoFil = document.getElementById('rrhh-tipo')?.value  || '';
  const cfg     = S._ckConfig || null;

  try {
    let registros = (await GET('/api/checadas')) || [];
    if (fi)     registros = registros.filter(c => c.fecha >= fi);
    if (ff)     registros = registros.filter(c => c.fecha <= ff);
    if (drFil)  registros = registros.filter(c => c.driverId === drFil);
    if (tipoFil)registros = registros.filter(c => c.tipo === tipoFil);

    if (!registros.length) {
      lista.innerHTML = `<div class="empty-state"><div class="empty-icon">⏰</div><p>Sin registros para los filtros seleccionados</p></div>`;
      return;
    }

    // Contar alertas para mostrar resumen
    const nAlertas = registros.filter(c => c.alertaBuddyPunch).length;
    const alertaResumen = nAlertas > 0
      ? `<div style="background:#fff3cd;border:1px solid #ffc107;color:#856404;padding:10px 16px;border-radius:8px;margin-bottom:12px;font-size:13px;font-weight:600">
           🚨 ${nAlertas} registro${nAlertas > 1 ? 's' : ''} con posible ingreso compartido (misma IP, distintos drivers en &lt;10 min)
         </div>`
      : '';

    lista.innerHTML = alertaResumen + `
      <div class="card" style="overflow-x:auto">
        <table>
          <thead><tr>
            <th>Driver</th>
            <th>Tipo</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>IP</th>
            <th>Ubicación GPS</th>
            <th>Validación</th>
          </tr></thead>
          <tbody>
            ${registros.map(c => {
              const esEntrada = c.tipo === 'ENTRADA';

              // Validación: usar dato guardado en el servidor; fallback a cálculo local
              let validacion = '';
              let estado     = c.validacionEstado || null;
              let dist       = c.distanciaKm      != null ? c.distanciaKm : null;

              // Fallback para registros antiguos sin validacionEstado
              if (!estado && c.lat != null && c.lng != null && cfg) {
                dist   = _haversineKm(c.lat, c.lng, cfg.lat, cfg.lng);
                estado = dist <= cfg.radiusKm ? 'valida' : 'fuera_de_zona';
              } else if (!estado && c.lat == null) {
                estado = 'sin_gps';
              }

              if (estado === 'valida') {
                const d = dist != null ? ` (${dist.toFixed(2)} km)` : '';
                validacion = `<span style="display:inline-flex;align-items:center;gap:4px;background:#d4edda;color:#155724;font-weight:700;font-size:12px;padding:3px 10px;border-radius:20px">✔ En zona${d}</span>`;
              } else if (estado === 'fuera_de_zona') {
                const d = dist != null ? ` (${dist.toFixed(2)} km)` : '';
                validacion = `<span style="display:inline-flex;align-items:center;gap:4px;background:#f8d7da;color:#721c24;font-weight:700;font-size:12px;padding:3px 10px;border-radius:20px">✖ Fuera de zona${d}</span>`;
              } else {
                validacion = `<span style="display:inline-flex;align-items:center;gap:4px;background:#f0f0f0;color:#888;font-size:12px;padding:3px 10px;border-radius:20px">📵 Sin GPS</span>`;
              }

              const gpsCell = c.lat != null
                ? `<span style="font-size:11px">${c.lat.toFixed(5)}, ${c.lng.toFixed(5)}<br><span style="color:var(--text-muted)">${c.locationStr ? c.locationStr.substring(0,45)+'…' : ''}</span></span>`
                : `<span style="color:var(--text-muted);font-size:12px">—</span>`;

              const buddyFlag = c.alertaBuddyPunch
                ? `<span title="Misma IP que otro driver en menos de 10 min" style="margin-left:6px;cursor:help">🚨</span>`
                : '';

              return `<tr${c.alertaBuddyPunch ? ' style="background:#fff8e1"' : ''}>
                <td><strong>${c.nombre}</strong>${buddyFlag}</td>
                <td><span style="font-weight:700;color:${esEntrada?'var(--green)':'var(--red)'}">${esEntrada?'✅':'🚪'} ${c.tipo}</span></td>
                <td>${c.fecha}</td>
                <td style="font-variant-numeric:tabular-nums">${c.hora}</td>
                <td style="font-size:11px;color:var(--text-muted)">${c.ip}</td>
                <td>${gpsCell}</td>
                <td>${validacion}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) { lista.innerHTML = `<div style="color:var(--red)">Error cargando registros</div>`; }
}

  _originalNavigate(viewId, opts);
};

// ════════════════════════════════════════════════════════════
//  APP INIT
// ════════════════════════════════════════════════════════════
async function initApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // Set user info in sidebar
  const initials = S.user.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('userAvatar').textContent    = initials;
  document.getElementById('userName').textContent      = S.user.nombre;
  document.getElementById('userRoleBadge').textContent = ROL_LABEL[S.user.rol]||S.user.rol;

  // Build navigation
  buildNav();

  // Preload shared data
  await preloadData();

  // Navigate to view: restore from URL hash if valid, else role default
  const defaultView = {
    admin_unico: 'dashboard', admin: 'dashboard',
    coordinador: 'nueva', asesor: 'nueva',
    driver: 'mis-viajes'
  };
  const knownViews = ['dashboard','calendario','reservaciones','nueva','mis-viajes',
    'estado-drivers','usuarios','vehiculos','welcome','nuevo-welcome',
    'reloj-checador','recursos-humanos'];
  const hashView = window.location.hash.slice(1);
  const startView = (hashView && knownViews.includes(hashView))
    ? hashView
    : (defaultView[S.user.rol] || 'calendario');
  navigate(startView);
}

// ════════════════════════════════════════════════════════════
//  EVENT LISTENERS
// ════════════════════════════════════════════════════════════
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const u = document.getElementById('loginUsername').value.trim();
  const p = document.getElementById('loginPassword').value;
  await doLogin(u, p);
});

document.getElementById('logoutBtn').addEventListener('click', doLogout);

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// ════════════════════════════════════════════════════════════
//  STARTUP — Check existing session
// ════════════════════════════════════════════════════════════
(async () => {
  try {
    const user = await GET('/api/me');
    if (user) { S.user = user; await initApp(); }
    else showLoginScreen();
  } catch(e) { showLoginScreen(); }
})();
</script>
</body>
