<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Xotics | Sistema de Reservaciones</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════
       VARIABLES & RESET
    ═══════════════════════════════════════════ */
    :root {
      --bg:        #f0f2f6;
      --surface:   #ffffff;
      --surface2:  #f5f6fa;
      --surface3:  #eaecf1;
      --border:    #dde1ea;
      --pink:      #ea1481;
      --pink-dark: #c01070;
      --pink-glow: rgba(234,20,129,0.08);
      --text:      #111827;
      --text-muted:#6b7280;
      --green:     #16a34a;
      --yellow:    #d97706;
      --red:       #dc2626;
      --blue:      #2563eb;
      --sidebar-w: 250px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }
    input, select, textarea, button { font-family: inherit; }
    a { color: var(--pink); text-decoration: none; }
    .hidden { display: none !important; }

    /* ═══════════════════════════════════════════
       SCROLLBAR
    ═══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #c4c9d6; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8afc0; }

    /* ═══════════════════════════════════════════
       LOGIN SCREEN
    ═══════════════════════════════════════════ */
    #loginScreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 30% 50%, rgba(234,20,129,0.08) 0%, transparent 60%), var(--bg);
      padding: 20px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }
    .login-logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 4px;
    }
    .logo-x { color: var(--pink); }
    .login-subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 36px;
    }
    .login-card .form-group { margin-bottom: 16px; }
    .login-card label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .login-card input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      transition: border-color .2s;
      outline: none;
    }
    .login-card input:focus { border-color: var(--pink); }
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #ef4444;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 14px;
    }

    /* ═══════════════════════════════════════════
       APP LAYOUT
    ═══════════════════════════════════════════ */
    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 8px rgba(0,0,0,0.04);
    }
    .sidebar-logo {
      padding: 24px 20px 20px;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 3px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #mainNav {
      flex: 1;
      padding: 12px 10px;
      overflow-y: auto;
    }
    .nav-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 12px 10px 6px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      transition: all .15s;
      margin-bottom: 2px;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active {
      background: var(--pink-glow);
      color: var(--pink);
      font-weight: 600;
    }
    .nav-icon { font-size: 16px; flex-shrink: 0; }
    #userProfile {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .user-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      background: var(--pink-glow);
      border: 2px solid var(--pink);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: var(--pink);
      flex-shrink: 0;
    }
    .user-info { flex: 1; overflow: hidden; }
    .user-info .u-name { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-info .u-role { font-size: 10px; color: var(--text-muted); text-transform: capitalize; }
    #logoutBtn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 16px; padding: 4px;
      transition: color .15s; flex-shrink: 0;
    }
    #logoutBtn:hover { color: var(--red); }

    /* MAIN AREA */
    #mainWrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    #pageTitle { font-size: 16px; font-weight: 700; }
    #viewContainer {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--pink); color: #fff; }
    .btn-primary:hover { background: var(--pink-dark); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface3); }
    .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-full { width: 100%; justify-content: center; padding: 13px; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ═══════════════════════════════════════════
       CARDS
    ═══════════════════════════════════════════ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    /* ═══════════════════════════════════════════
       STATUS BADGES
    ═══════════════════════════════════════════ */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .badge-pendiente   { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-en-camino   { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-completado  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .badge-no-show     { background: rgba(239,68,68,0.15);  color: var(--red); }
    .badge-pago-pendiente  { background: rgba(245,158,11,0.12); color: var(--yellow); }
    .badge-pago-pagado     { background: rgba(34,197,94,0.12);  color: var(--green); }
    .badge-pago-por-cobrar { background: rgba(59,130,246,0.12); color: var(--blue); }
    .badge-en-hotel        { background: rgba(234,20,129,0.10); color: var(--pink); }

    /* UDN selector toggle */
    .udn-toggle { display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:24px; }
    .udn-btn { padding:9px 20px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .15s;font-family:inherit; }
    .udn-btn.hotel-active  { background:var(--pink);color:#fff; }
    .udn-btn.welcome-active{ background:#06b6d4;color:#fff; }
    .udn-btn.inactive      { background:var(--surface2);color:var(--text-muted); }
    .udn-btn.inactive:hover{ background:var(--surface3); }

    /* ═══════════════════════════════════════════
       FORM ELEMENTS
    ═══════════════════════════════════════════ */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .form-full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      transition: border-color .2s;
      outline: none;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--pink); }
    .form-group select { cursor: pointer; }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group input[type="number"] { -moz-appearance: textfield; }
    .form-group input[type="number"]::-webkit-outer-spin-button,
    .form-group input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .price-display {
      background: var(--pink-glow);
      border: 1px solid var(--pink);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 18px;
      font-weight: 700;
      color: var(--pink);
    }
    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }
    .form-section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    /* ═══════════════════════════════════════════
       TABLE
    ═══════════════════════════════════════════ */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 12px 14px; font-size: 13px; vertical-align: middle; }
    .td-actions { display: flex; gap: 6px; justify-content: flex-end; }

    /* ═══════════════════════════════════════════
       DASHBOARD
    ═══════════════════════════════════════════ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      border-left: 3px solid var(--pink);
    }
    .stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 8px; }
    .stat-value { font-size: 24px; font-weight: 800; color: var(--text); }
    .stat-sub   { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .stat-card.green  { border-left-color: var(--green); }
    .stat-card.yellow { border-left-color: var(--yellow); }
    .stat-card.blue   { border-left-color: var(--blue); }

    .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .dash-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .status-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .status-row:last-child { border-bottom: none; }
    .rank-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .rank-row:last-child { border-bottom: none; }
    .rank-num { font-size: 11px; color: var(--text-muted); width: 18px; text-align: center; flex-shrink: 0; }
    .rank-label { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .rank-value { font-size: 12px; font-weight: 700; color: var(--pink); flex-shrink: 0; }
    .rank-sub { font-size: 10px; color: var(--text-muted); flex-shrink: 0; }
    .bar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 4px; }
    .bar-fill { height: 100%; background: var(--pink); border-radius: 2px; }

    /* ═══════════════════════════════════════════
       CALENDAR
    ═══════════════════════════════════════════ */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-month-title { font-size: 18px; font-weight: 700; }
    .cal-nav { display: flex; gap: 8px; align-items: center; }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }
    .cal-day-header {
      text-align: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 8px 0;
    }
    .cal-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      min-height: 72px;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cal-cell:hover { background: var(--surface2); border-color: #b0b8cc; }
    .cal-cell.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
    .cal-cell.today { border-color: var(--pink); }
    .cal-cell.selected { background: var(--pink-glow); border-color: var(--pink); }
    .cal-day-num { font-size: 13px; font-weight: 600; }
    .cal-cell.today .cal-day-num { color: var(--pink); }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 3px; }
    .cal-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-pendiente  { background: var(--yellow); }
    .dot-en-camino  { background: var(--blue); }
    .dot-completado { background: var(--green); }
    .dot-no-show    { background: var(--red); }
    .cal-count { font-size: 10px; color: var(--text-muted); }

    /* Day panel below calendar */
    #dayPanel { margin-top: 4px; }
    .day-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .day-panel-title { font-size: 14px; font-weight: 700; }

    /* ═══════════════════════════════════════════
       BOOKING CARDS
    ═══════════════════════════════════════════ */
    .booking-list { display: flex; flex-direction: column; gap: 10px; }
    .booking-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      border-left: 3px solid var(--border);
      transition: border-color .15s;
      cursor: pointer;
    }
    .booking-card:hover { border-color: var(--pink); }
    .booking-card.status-pendiente  { border-left-color: var(--yellow); }
    .booking-card.status-en-camino  { border-left-color: var(--blue); }
    .booking-card.status-completado { border-left-color: var(--green); }
    .booking-card.status-no-show    { border-left-color: var(--red); }
    .booking-card.welcome-card      { border-left-color: #06b6d4; background: rgba(6,182,212,.04); }
    .welcome-tag { display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;
                   background:rgba(6,182,212,.15);color:#06b6d4;letter-spacing:.5px; }
    .booking-card-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .booking-card-top { margin-bottom: 6px; }
    .booking-guest { font-size: 14px; font-weight: 700; flex: 1; }
    .booking-time  { font-size: 12px; color: var(--pink); font-weight: 600; }
    .booking-meta  { font-size: 12px; color: var(--text-muted); display: flex; gap: 14px; flex-wrap: wrap; }
    .booking-meta span { display: flex; align-items: center; gap: 4px; }
    .booking-price { font-size: 13px; font-weight: 700; color: var(--pink); margin-left: auto; }

    /* ═══════════════════════════════════════════
       DRIVER VIEW (MIS VIAJES)
    ═══════════════════════════════════════════ */
    .trip-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 14px;
      border-left: 4px solid var(--border);
    }
    .trip-card.status-pendiente  { border-left-color: var(--yellow); }
    .trip-card.status-en-camino  { border-left-color: var(--blue); }
    .trip-card.status-completado { border-left-color: var(--green); }
    .trip-card.status-no-show    { border-left-color: var(--red); }
    .trip-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .trip-guest { font-size: 16px; font-weight: 700; }
    .trip-datetime { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .trip-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
    .trip-info-item label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .8px; }
    .trip-info-item p { font-size: 13px; font-weight: 500; margin-top: 2px; }
    .trip-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .trip-notes { background: var(--surface2); border-radius: 6px; padding: 10px; font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }

    /* ═══════════════════════════════════════════
       MODAL
    ═══════════════════════════════════════════ */
    #modalOverlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    #modalBox {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: 100%;
      max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }
    #modalClose {
      position: sticky; top: 0; float: right;
      margin: 14px 14px 0 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      width: 28px; height: 28px;
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
      transition: color .15s;
    }
    #modalClose:hover { color: var(--text); }
    #modalContent { padding: 20px 24px 24px; }
    .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 24px; margin-bottom: 16px; }
    .detail-item label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; font-weight: 600; }
    .detail-item p { font-size: 14px; font-weight: 500; margin-top: 3px; }
    .detail-full { grid-column: 1 / -1; }

    /* ═══════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════ */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);

async function api(method, url, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' },
    ...(body ? { body: JSON.stringify(body) } : {})
  };
  const res = await fetch(url, opts);
  if (res.status === 401) { showLoginScreen(); return null; }
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Error del servidor');
  return data;
}
const GET  = (url)        => api('GET',    url);
const POST = (url, body)  => api('POST',   url, body);
const PUT  = (url, body)  => api('PUT',    url, body);
const DEL  = (url)        => api('DELETE', url);

function statusLabel(s) {

}
function servicioLabelDisplay(b) {

  const base = servicioLabel(b.tipoServicio);
  if (b.tipoServicio === 'servicio-redondo' && b.origenTitulo) return `Servicio Redondo ${b.origenTitulo}`;
  return base;
}
function esOrigenHotel(b) {
  return ['HXM','HXM II','HXA'].includes(b.origenTipo || b.origen);
}
function pagoLabel(s) {
  return {pendiente:'Pago Pendiente',pagado:'Pagado','por-cobrar':'Por Cobrar'}[s]||s;
}
function metodoLabel(s) {
  return {tarjeta:'Tarjeta',link:'Link de Pago',efectivo:'Efectivo MXN',usd:'Efectivo USD','club-cash':'Club Cash'}[s]||s||'—';
}
function servicioLabel(s) {
  return {
    traslado:'Traslado',
    retorno:'Retorno',
    'servicio-abierto':'Servicio Abierto',
    'servicio-redondo':'Servicio Redondo',
    otro:'Otro',
    // compatibilidad hacia atrás
    tour:'Retorno',
    'por-horas':'Servicio Abierto'
  }[s]||s;
}
function badge(s) {
  return `<span class="badge badge-${s}">${statusLabel(s)}</span>`;
}
function badgePago(s) {
  return `<span class="badge badge-pago-${s}">${pagoLabel(s)}</span>`;
}

// Auto-calculate price
function calcPrice(destinoName, vehiculoTipo, tipoServicio, horas) {
  // servicio-abierto (formerly por-horas): rate by vehicle + hours
  if (tipoServicio === 'servicio-abierto' || tipoServicio === 'por-horas') {
    const rates = HORAS_RATES[vehiculoTipo];
    if (!rates) return 0;
    const h = Math.max(parseInt(horas) || 3, 3);
    return h <= 3 ? rates.min3h : rates.min3h + (h - 3) * rates.porHora;
  }
  // precio libre — no auto-calc
  if (['servicio-redondo','otro'].includes(tipoServicio)) return null;
  // traslado / retorno: lookup tarifario
  const row = TARIFARIO.find(t => t.destino === destinoName);
  if (!row || !vehiculoTipo) return 0;
  return row[vehiculoTipo] || 0;
}

    driver: [
      { id:'mis-viajes',         icon:'🗺️', label:'Mis Viajes'         },
      { id:'reloj-checador',     icon:'⏰',  label:'Reloj Checador'     },
    ],
  };

  nav.innerHTML = (menus[rol]||[]).map(m =>
    `<button class="nav-item" data-view="${m.id}" onclick="navigate('${m.id}')">

function setActiveNav(viewId) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.view === viewId);

}

const PAGE_TITLES = {
  dashboard:         'Dashboard',
  calendario:        'Calendario',
  reservaciones:     'Reservaciones',
  nueva:             'Nueva Reservación',
  'mis-viajes':        'Mis Viajes',
  'estado-drivers':    'Estado de Drivers',
  'reloj-checador':    'Reloj Checador',
  'recursos-humanos':  'Recursos Humanos',

};

// ─── MOBILE MENU ──────────────────────────────────────────────
function toggleMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobileOverlay');
  if (!sidebar) return;
  sidebar.classList.toggle('open');
  if (sidebar.classList.contains('open')) overlay.classList.add('open');
  else overlay.classList.remove('open');
}
function closeMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('mobileOverlay');
  if (sidebar) sidebar.classList.remove('open');
  if (overlay) overlay.classList.remove('open');
}

function navigate(viewId, opts={}) {
  closeMobileMenu();
  // Limpiar intervals al salir de las vistas con auto-refresh
  clearInterval(driverStatusInterval); driverStatusInterval = null;
  clearInterval(dashboardInterval);    dashboardInterval    = null;
  clearInterval(_clockInterval);       _clockInterval       = null;

  S.currentView = viewId;
  setActiveNav(viewId);
  document.getElementById('pageTitle').textContent = PAGE_TITLES[viewId] || viewId;

  // Persistir navegación en el hash de la URL (sin recargar)
  if (history.replaceState) {
    history.replaceState(null, '', '#' + viewId);
  }

  const renders = {
    dashboard:         renderDashboard,
    calendario:        renderCalendar,
    reservaciones:     renderReservaciones,
    nueva:             () => renderBookingForm(null, opts.fecha||null),
    'mis-viajes':      renderMisViajes,
    'estado-drivers':  renderEstadoDrivers,
    usuarios:          renderUsuarios,
    vehiculos:           renderVehiculos,
    welcome:             renderWelcome,
    'nuevo-welcome':     () => renderWelcomeForm(null),
    'reloj-checador':    renderRelojChecador,
    'recursos-humanos':  renderRecursosHumanos,
  };
  (renders[viewId] || (() => {}))();
}

async function renderDashboard() {
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="navigate('nueva')">＋ Nueva Reservación</button>`;
  const vc = document.getElementById('viewContainer');

async function _loadDashboard(vc) {
  if (!vc) return;
  try {
    const stats = await GET('/api/stats');
    if (!stats) throw new Error('Sin datos');
    const resumen   = stats.resumen   || {};
    const estatus   = stats.estatus   || {};
    const byDriver  = stats.byDriver  || [];
    const byDestino = stats.byDestino || [];
    const weekly    = stats.weekly    || [];
    const monthly   = stats.monthly   || {};

    const hoy              = resumen.hoy              || { ingresos:0, viajes:0 };
    const semana           = resumen.semana            || { ingresos:0, viajes:0 };
    const mes              = resumen.mes               || { ingresos:0, viajes:0 };
    const transaccionesHoy = resumen.transaccionesHoy  || { ingresos:0, viajes:0 };

    const maxDriver  = Math.max(...byDriver.map(d=>d.total), 1);
    const maxDestino = Math.max(...byDestino.map(d=>d.total), 1);
    const maxWeekly  = Math.max(...weekly.map(w=>w.total||0), 1);

    const monthlyArr = [
      { label:'HXM',     val: monthly.hxm     || 0, color:'var(--pink)'  },
      { label:'HXM II',  val: monthly.hxm2    || 0, color:'var(--blue)'  },
      { label:'HXA',     val: monthly.hxa      || 0, color:'var(--green)' },
      { label:'Welcome', val: monthly.welcome  || 0, color:'#06b6d4'      },
    ];
    const maxMonthly = Math.max(...monthlyArr.map(x=>x.val), 1);

    // ── Stacked weekly chart ──────────────────────────────
    const SEG_COLORS = ['var(--pink)','var(--blue)','var(--green)','#06b6d4'];
    const SEG_KEYS   = ['hxm','hxm2','hxa','welcome'];
    let weeklyChartHtml = '<p style="color:var(--text-muted);font-size:13px">Sin datos</p>';
    if (weekly.length > 0) {
      let barsHtml = '', labelsHtml = '';
      weekly.forEach(w => {
        const tot = w.total || 0;
        const totalH = Math.max(Math.round(tot / maxWeekly * 110), tot > 0 ? 3 : 0);
        let segsHtml = '';
        SEG_KEYS.forEach((k, si) => {
          const h = tot > 0 ? Math.max(Math.round((w[k]||0) / maxWeekly * 110), 0) : 0;
          if (h > 0) segsHtml += '<div style="width:100%;height:' + h + 'px;background:' + SEG_COLORS[si] + ';"></div>';
        });
        barsHtml +=
          '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">' +
            '<div style="font-size:9px;color:var(--text-muted);font-weight:600;text-align:center">' + fmxn(tot) + '</div>' +
            '<div style="width:100%;min-height:' + totalH + 'px;display:flex;flex-direction:column;' +
              'justify-content:flex-end;border-radius:4px 4px 0 0;overflow:hidden">' + segsHtml + '</div>' +
          '</div>';
        labelsHtml +=
          '<div style="flex:1;text-align:center">' +
            '<div style="font-size:10px;color:var(--text-muted)">' + w.label + '</div>' +
            '<div style="font-size:10px;color:var(--text-muted)">' + (w.viajes||0) + ' viaje(s)</div>' +
          '</div>';
      });
      const legendHtml = [['HXM','var(--pink)'],['HXM II','var(--blue)'],['HXA','var(--green)'],['Welcome','#06b6d4']].map(
        ([l,c]) => '<span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text-muted)">' +
                   '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + c + '"></span>' + l + '</span>'
      ).join('');
      weeklyChartHtml =
        '<div style="display:flex;align-items:flex-end;gap:12px;height:140px;padding-bottom:6px">' + barsHtml + '</div>' +
        '<div style="display:flex;gap:12px;margin-top:4px">' + labelsHtml + '</div>' +
        '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">' + legendHtml + '</div>';
    }

    // ── Monthly chart ────────────────────────────────────
    let monthlyChartHtml = '<p style="color:var(--text-muted);font-size:13px">Sin datos este mes</p>';
    if (!monthlyArr.every(x => x.val === 0)) {
      let mBarsHtml = '', mLabelsHtml = '';
      monthlyArr.forEach(x => {
        const h = Math.max(Math.round(x.val / maxMonthly * 100), x.val > 0 ? 3 : 0);
        mBarsHtml +=
          '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">' +
            '<div style="font-size:10px;color:var(--text-muted);font-weight:600;text-align:center">' + fmxn(x.val) + '</div>' +
            '<div style="width:100%;height:' + h + 'px;background:' + x.color + ';border-radius:4px 4px 0 0;min-height:' + (x.val>0?3:0) + 'px"></div>' +
          '</div>';
        mLabelsHtml +=
          '<div style="flex:1;text-align:center">' +
            '<span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:' + x.color + ';margin-right:3px"></span>' +
            '<span style="font-size:10px;color:var(--text-muted)">' + x.label + '</span>' +
          '</div>';
      });
      monthlyChartHtml =
        '<div style="display:flex;align-items:flex-end;gap:16px;height:120px;padding-bottom:6px;margin-bottom:8px">' + mBarsHtml + '</div>' +
        '<div style="display:flex;gap:16px">' + mLabelsHtml + '</div>';
    }

    vc.innerHTML = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Ventas de Hoy</div>
        <div class="stat-value">${fmxn(hoy.ingresos)}</div>
        <div class="stat-sub">${hoy.viajes} viaje(s)</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Transacciones de Hoy</div>
        <div class="stat-value">${fmxn(transaccionesHoy.ingresos)}</div>
        <div class="stat-sub">${transaccionesHoy.viajes} reservación(es) creadas hoy</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Esta Semana</div>
        <div class="stat-value">${fmxn(semana.ingresos)}</div>
        <div class="stat-sub">${semana.viajes} viaje(s)</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-label">Este Mes</div>
        <div class="stat-value">${fmxn(mes.ingresos)}</div>
        <div class="stat-sub">${mes.viajes} viaje(s)</div>
      </div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-title">Estatus de Viajes</div>
        ${[
          ['Pendiente',  'pendiente',   estatus.pendiente,    'yellow'],
          ['En Camino',  'en-camino',   estatus['en-camino'], 'blue'],
          ['Completado', 'completado',  estatus.completado,   'green'],
          ['No Show',    'no-show',     estatus['no-show'],   'red'],
        ].map(([lbl,key,cnt,c])=>`
          <div class="status-row">
            <span class="badge badge-${key}">${lbl}</span>
            <span style="font-weight:700;font-size:18px;color:var(--${c})">${cnt}</span>
          </div>`).join('')}
      </div>

      <div class="card">
        <div class="card-title">Ventas por Semana</div>
        ${weeklyChartHtml}
      </div>
    </div>

    <div class="dash-grid">
      <div class="card">
        <div class="card-title">Ventas del Mes por Unidad</div>
        ${monthlyChartHtml}
      </div>

      <div class="card">
        <div class="card-title">Ventas por Driver</div>
        ${byDriver.length===0 ? '<p style="color:var(--text-muted);font-size:13px">Sin datos</p>' :
          byDriver.map((d,i)=>`
            <div class="rank-row">
              <span class="rank-num">${i+1}</span>
              <div style="flex:1;overflow:hidden">
                <div class="rank-label">${d.nombre}</div>
                <div class="bar"><div class="bar-fill" style="width:${Math.round(d.total/maxDriver*100)}%"></div></div>
              </div>
              <div style="text-align:right">
                <div class="rank-value">${fmxn(d.total)}</div>
                <div class="rank-sub">${d.viajes} viaje(s)</div>
              </div>
            </div>`).join('')}
      </div>
    </div>

    <div class="dash-grid" style="grid-template-columns:1fr">
      <div class="card">
        <div class="card-title">Top Destinos por Venta</div>
        ${byDestino.length===0 ? '<p style="color:var(--text-muted);font-size:13px">Sin datos</p>' :
          byDestino.map((d,i)=>`
            <div class="rank-row">
              <span class="rank-num">${i+1}</span>
              <div style="flex:1;overflow:hidden">
                <div class="rank-label" title="${d.destino}">${d.destino}</div>
                <div class="bar"><div class="bar-fill" style="width:${Math.round(d.total/maxDestino*100)}%"></div></div>
              </div>
              <div style="text-align:right">
                <div class="rank-value">${fmxn(d.total)}</div>
                <div class="rank-sub">${d.viajes} viaje(s)</div>
              </div>
            </div>`).join('')}
      </div>
    </div>`;
  } catch(e) {
    showToast('Error cargando estadísticas', 'error');
  }
}

async function renderCalendar() {
  document.getElementById('topbarActions').innerHTML =
    `<button class="btn btn-primary btn-sm" onclick="navigate('nueva',{fecha:S.selDate||today()})">＋ Nueva Reservación</button>`;

  // Inicializar calMonth con la fecha de hoy en Cancún si aún no está definido
  if (!S.calMonth) {
    const tp = today().split('-');
    S.calMonth = new Date(parseInt(tp[0]), parseInt(tp[1])-1, 1);
  }

  const vc = document.getElementById('viewContainer');
  vc.innerHTML = `<div id="calWrapper"></div><div id="dayPanel"></div>`;

  await buildCalendarGrid();

  if (!S.selDate) S.selDate = today();
  await loadDayBookings(S.selDate);
}

async function buildCalendarGrid() {
  const year  = S.calMonth.getFullYear();
  const month = S.calMonth.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const offset = firstDow === 0 ? 6 : firstDow - 1; // Monday first

  // Load bookings for this month
  const mes = `${year}-${String(month+1).padStart(2,'0')}`;
  let monthBookings = [];
  try { monthBookings = (await GET(`/api/bookings?mes=${mes}`)) || []; } catch(e) {}

  // Group by date
  const byDate = {};
  monthBookings.forEach(b => {
    if (!byDate[b.fecha]) byDate[b.fecha] = [];
    byDate[b.fecha].push(b);
  });

  const todayStr = today();

  let html = `
    <div class="card" style="margin-bottom:16px">
      <div class="cal-header">
        <div class="cal-nav">
          <button class="btn btn-secondary btn-sm" onclick="calNav(-1)">‹</button>
          <button class="btn btn-secondary btn-sm" onclick="calGoToday()">Hoy</button>
          <button class="btn btn-secondary btn-sm" onclick="calNav(1)">›</button>
        </div>
        <span class="cal-month-title">${MESES_ES[month]} ${year}</span>
        <div style="width:120px"></div>
      </div>
      <div class="cal-grid">
        ${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'].map(d=>`<div class="cal-day-header">${d}</div>`).join('')}
        ${Array(offset).fill(`<div class="cal-cell empty"></div>`).join('')}
        ${Array.from({length:daysInMonth},(_,i)=>{
          const d = i+1;
          const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          const bks = byDate[dateStr]||[];
          const isToday    = dateStr===todayStr;
          const isSelected = dateStr===S.selDate;
          const dots = bks.slice(0,8).map(b=>`<span class="cal-dot dot-${b.estatusViaje}"></span>`).join('');
          return `<div class="cal-cell${isToday?' today':''}${isSelected?' selected':''}" onclick="selectCalDay('${dateStr}')">
            <span class="cal-day-num">${d}</span>
            <div class="cal-dots">${dots}</div>
            ${bks.length>0?`<span class="cal-count">${bks.length} viaje(s)</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`;
  document.getElementById('calWrapper').innerHTML = html;
}

async function selectCalDay(dateStr) {
  S.selDate = dateStr;
  document.querySelectorAll('.cal-cell.selected').forEach(el=>el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  await loadDayBookings(dateStr);
}

async function loadDayBookings(dateStr) {
  const panel = document.getElementById('dayPanel');
  if (!panel) return;
  panel.innerHTML = `<div style="color:var(--text-muted);font-size:13px">Cargando…</div>`;
  try {
    const bks = (await GET(`/api/bookings?fecha=${dateStr}`)) || [];
    S.dayBookings = bks;
    renderDayPanel(dateStr, bks);
  } catch(e) {
    panel.innerHTML = '';
  }
}

function renderDayPanel(dateStr, bks) {
  const panel = document.getElementById('dayPanel');
  if (!panel) return;
  const canCreate = S.user.rol !== 'driver';
  panel.innerHTML = `
    <div class="day-panel-header">
      <span class="day-panel-title">${fdate(dateStr)} — ${bks.length} viaje(s)</span>
      ${canCreate ? `<button class="btn btn-primary btn-sm" onclick="navigate('nueva',{fecha:'${dateStr}'})">＋ Agregar</button>`:''}
    </div>
    ${bks.length===0
      ? `<div class="empty-state"><div class="empty-icon">🗓️</div><p>Sin reservaciones para este día</p></div>`
      : `<div class="booking-list">${bks.map(b=>bookingCard(b,true)).join('')}</div>`}`;
}

async function calNav(dir) {
  S.calMonth = new Date(S.calMonth.getFullYear(), S.calMonth.getMonth()+dir, 1);
  await buildCalendarGrid();
}
async function calGoToday() {
  // Re-initialize from today in Cancún time
  const todayParts = today().split('-');
  S.calMonth = new Date(parseInt(todayParts[0]), parseInt(todayParts[1])-1, 1);
  S.selDate  = today();
  await buildCalendarGrid();
  await loadDayBookings(S.selDate);
}

async function applyFilters() {
  const fechaInicio   = document.getElementById('filterFechaInicio')?.value || '';
  const fechaFin      = document.getElementById('filterFechaFin')?.value    || '';
  const estatus       = document.getElementById('filterEstatus')?.value     || '';
  const buscar        = (document.getElementById('filterBuscar')?.value     || '').trim().toLowerCase();
  const chkHoteles    = document.getElementById('chkHoteles')?.checked !== false;
  const chkWelcome    = document.getElementById('chkWelcome')?.checked  !== false;
  const canSeeWelcome = ['admin_unico','admin','coordinador'].includes(S.user.rol);

  try {
    let items = [];

    // Hotel bookings
    if (chkHoteles || !canSeeWelcome) {
      let bks = (await GET('/api/bookings')) || [];
      if (fechaInicio) bks = bks.filter(b => b.fecha >= fechaInicio);
      if (fechaFin)    bks = bks.filter(b => b.fecha <= fechaFin);
      if (estatus)     bks = bks.filter(b => b.estatusViaje === estatus);
      if (buscar) bks = bks.filter(b => {
        const nombre = (b.huespedNombre || '').toLowerCase();
        const email  = (b.huespedEmail  || '').toLowerCase();
        const id     = (b.bookingId     || '').toLowerCase();
        return nombre.includes(buscar) || email.includes(buscar) || id.includes(buscar);
      });
      items = bks.map(b => ({ ...b, _type:'booking' }));
    }

    // Welcome records (solo para roles que pueden verlos)
    if (canSeeWelcome && chkWelcome) {
      let wels = (await GET('/api/welcomes')) || [];
      if (fechaInicio) wels = wels.filter(w => w.fecha >= fechaInicio);
      if (fechaFin)    wels = wels.filter(w => w.fecha <= fechaFin);
      if (buscar) wels = wels.filter(w => {
        const nombre = (w.nombre     || '').toLowerCase();
        const id     = (w.welcomeId  || '').toLowerCase();
        return nombre.includes(buscar) || id.includes(buscar);
      });
      items = items.concat(wels.map(w => ({ ...w, _type:'welcome' })));
    }

    // Ordenar por fecha de creación descendente (más recientes primero)
    items.sort((a, b) => {
      const ca = a.creadoEn || a.fecha || '';
      const cb = b.creadoEn || b.fecha || '';
      return cb.localeCompare(ca);
    });

    S.filteredItems = items; // store for CSV export
    S.resPage = 0;           // reset to first page on filter change
    renderResPage();
  } catch(e) { showToast('Error cargando reservaciones','error'); }
}

const RES_PAGE_SIZE = 25;

function renderResPage() {
  const list = document.getElementById('resList');
  if (!list) return;
  const items   = S.filteredItems || [];
  const page    = S.resPage || 0;
  const total   = items.length;
  const pages   = Math.max(1, Math.ceil(total / RES_PAGE_SIZE));
  const start   = page * RES_PAGE_SIZE;
  const end     = Math.min(start + RES_PAGE_SIZE, total);
  const slice   = items.slice(start, end);

  const pagCtrl = pages > 1 ? `
    <div class="res-pagination">
      <button class="btn btn-secondary btn-sm" onclick="resPageGo(${page-1})" ${page===0?'disabled':''}>‹ Anterior</button>
      <span style="color:var(--text-muted);font-size:13px">Página ${page+1} de ${pages} &nbsp;·&nbsp; ${total} registro${total!==1?'s':''}</span>
      <button class="btn btn-secondary btn-sm" onclick="resPageGo(${page+1})" ${page>=pages-1?'disabled':''}>Siguiente ›</button>
    </div>` : (total > 0 ? `<div class="res-pagination"><span style="color:var(--text-muted);font-size:13px">${total} registro${total!==1?'s':''}</span></div>` : '');

  list.innerHTML = total === 0
    ? `<div class="empty-state"><div class="empty-icon">📋</div><p>Sin reservaciones para los filtros seleccionados</p></div>`
    : `<div class="booking-list">${slice.map(item =>
        item._type === 'welcome' ? welcomeCard(item, true) : bookingCard(item, true)
      ).join('')}</div>${pagCtrl}`;
}

function resPageGo(page) {
  const items = S.filteredItems || [];
  const pages = Math.max(1, Math.ceil(items.length / RES_PAGE_SIZE));
  S.resPage = Math.max(0, Math.min(page, pages - 1));
  renderResPage();
  document.getElementById('resList')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function downloadCsv() {
  const items = S.filteredItems || [];
  if (!items.length) { showToast('No hay datos para exportar', 'error'); return; }

  const esc = v => {
    const s = (v === null || v === undefined) ? '' : String(v);
    return s.includes(',') || s.includes('"') || s.includes('\n')
      ? '"' + s.replace(/"/g, '""') + '"'
      : s;
  };

  const hotelHeaders = ['Tipo','ID','Fecha','Hora','Nombre','Teléfono','Email','Origen','Destino','Servicio','Pasajeros','Vuelo','Vehículo','Driver','Precio','Método Pago','Estatus Pago','Estatus Viaje','Notas'];
  const welcomeHeaders = ['Tipo','ID','Fecha','Hora','Nombre','Destino','No. Invitación','Costo','Driver','Folio','Estatus'];

  // Use hotel headers as base; welcomes fill matching columns
  const allHeaders = ['Tipo','ID','Fecha','Hora','Nombre','Teléfono','Email','Origen','Destino','Servicio','Pasajeros','Vuelo','Vehículo','Driver','Precio/Costo','Método Pago','Estatus Pago','Estatus Viaje','Notas','No. Invitación','Folio'];

  const rows = items.map(item => {
    if (item._type === 'welcome') {
      return [
        'WELCOME', item.welcomeId||'', item.fecha||'', item.hora||'',
        item.nombre||'', '', '', '', item.destino||'',
        '', '', '', '', item.driverNombre||item.driverId||'',
        item.costo||0, '', '', item.estatusViaje||'',
        '', item.numeroInvitacion||'', item.folio||''
      ];
    } else {
      return [
        'HOTEL', item.bookingId||'', item.fecha||'', item.hora||'',
        item.huespedNombre||'', item.huespedTelefono||'', item.huespedEmail||'',
        item.origen||'', item.destino||'', item.tipoServicio||'',
        item.pasajeros||'', item.numeroVuelo||'',
        item.vehiculoNombre||item.vehiculoTipo||'', item.driverNombre||'',
        item.precio||0, item.metodoPago||'', item.estatusPago||'',
        item.estatusViaje||'', item.notas||'', '', ''
      ];
    }
  });

  const csvContent = [allHeaders, ...rows].map(row => row.map(esc).join(',')).join('\r\n');
  const bom = '\uFEFF'; // UTF-8 BOM for Excel
  const blob = new Blob([bom + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  const fi = document.getElementById('filterFechaInicio')?.value || today();
  const ff = document.getElementById('filterFechaFin')?.value   || today();
  link.download = `reservaciones_${fi}_${ff}.csv`;
  link.click();
  URL.revokeObjectURL(url);
  showToast(`Exportando ${items.length} registros ✅`, 'success');
}

            <option value="HXM"    ${(b.origenTipo||b.origen)==='HXM'   ?'selected':''}>HXM</option>
            <option value="HXM II" ${(b.origenTipo||b.origen)==='HXM II'?'selected':''}>HXM II</option>
            <option value="HXA"    ${(b.origenTipo||b.origen)==='HXA'   ?'selected':''}>HXA</option>
            <option value="OTRO"   ${(b.origenTipo==='OTRO'||(!['HXM','HXM II','HXA',''].includes(b.origenTipo||'')))&&b.origen?'selected':''}>OTRO</option>
          </select>
        </div>
        <div class="form-group" id="origen-otro-group" style="${(!esOtro && (b.origenTipo==='OTRO'||(!['HXM','HXM II','HXA','',undefined].includes(b.origenTipo)))&&b.origen)?'':'display:none'}">
          <label>Especificar Origen</label>
          <input type="text" id="f-origen-texto" value="${(!['HXM','HXM II','HXA'].includes(b.origenTipo||''))&&b.origen?b.origen:''}" placeholder="Nombre del hotel o lugar">
        </div>
        <div class="form-group" id="origen-libre-group" style="${esOtro?'':'display:none'}">
          <label>Origen *</label>
          <input type="text" id="f-origen-libre" value="${esOtro?(b.origen||''):''}" placeholder="Ingresa el origen">
        </div>

        <!-- DESTINO -->
        <div class="form-group" id="destino-select-group" style="${esTextoLibre?'display:none':''}">
          <label>Destino *</label>
          <select id="f-destino" onchange="recalcPrice()">${destinoOptions}</select>
        </div>
        <div class="form-group" id="destino-text-group" style="${esTextoLibre?'':'display:none'}">
          <label>Destino *</label>
          <input type="text" id="f-destino-text" value="${esTextoLibre?(b.destino||''):''}" placeholder="${esOtro?'Ingresa el destino':'Ej: Recorrido por Playa del Carmen'}">
        </div>

        <div class="form-group">
          <label>No. de Pasajeros *</label>
          <input type="number" id="f-pasajeros" value="${b.pasajeros||1}" min="1" max="20">
        </div>
        <div class="form-group">
          <label>No. de Vuelo (opcional)</label>
          <input type="text" id="f-vuelo" value="${b.numeroVuelo||''}" placeholder="AM 123">
        </div>
      </div>

      ${canAssign ? `
      <hr class="section-divider">
      <p class="form-section-title">Vehículo y Driver</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Vehículo</label>
          <select id="f-vehiculo" onchange="recalcPrice()">${vehicleTypeOptions}</select>
        </div>
        <div class="form-group">
          <label>Driver Asignado</label>
          <select id="f-conductor">${conductorOptions}</select>
        </div>
      </div>` : ''}

      <hr class="section-divider">
      <p class="form-section-title">Precio y Pago</p>
      <div class="form-grid">
        <div class="form-group">
          <label>Precio (MXN)</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="number" id="f-precio" value="${initialPrecio}" min="0" style="flex:1" oninput="updatePriceDisplay()">
            <button type="button" class="btn btn-secondary btn-sm" onclick="recalcPrice()" title="Recalcular del tarifario" id="btn-calcular">↺ Calcular</button>
          </div>
          <div class="price-display" id="priceDisplay" style="margin-top:8px">${fmxn(initialPrecio)}</div>
        </div>
        <div class="form-group">
          <label>Método de Pago</label>
          <select id="f-metodo-pago">
            <option value="">— Seleccionar —</option>
            <option value="tarjeta"   ${b.metodoPago==='tarjeta'?'selected':''}>Tarjeta de Crédito</option>
            <option value="link"      ${b.metodoPago==='link'?'selected':''}>Link</option>
            <option value="efectivo"  ${b.metodoPago==='efectivo'?'selected':''}>Efectivo</option>
            <option value="usd"       ${b.metodoPago==='usd'?'selected':''}>USD</option>
            <option value="club-cash" ${b.metodoPago==='club-cash'?'selected':''}>Club Cash</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estatus de Pago</label>
          <select id="f-pago">
            <option value="pendiente"  ${b.estatusPago==='pendiente'?'selected':''}>Pago Pendiente</option>
            <option value="pagado"     ${(!b.estatusPago||b.estatusPago==='pagado')?'selected':''}>Pagado</option>
            <option value="por-cobrar" ${b.estatusPago==='por-cobrar'?'selected':''}>Por Cobrar</option>
          </select>
        </div>
      </div>

      <div class="form-group" style="margin-top:4px">
        <label>Notas Especiales</label>
        <textarea id="f-notas" placeholder="Silla de bebé, recogida en lobby, nombre en letrero…">${b.notas||''}</textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="navigate('${S.user.rol==='driver'?'mis-viajes':'calendario'}')">Cancelar</button>
        <button class="btn btn-primary" onclick="saveBooking(${editId?`'${editId}'`:null})">
          ${editId ? '💾 Guardar Cambios' : '✅ Crear Reservación'}
        </button>
      </div>
    </div>`;
}

function onOrigenChange() {
  const val = document.getElementById('f-origen-tipo')?.value;
  const otroGroup = document.getElementById('origen-otro-group');
  if (otroGroup) otroGroup.style.display = val === 'OTRO' ? '' : 'none';
}

function onTipoChange() {
  const tipo = document.getElementById('f-tipo').value;
  const esTextoLibre = ['servicio-abierto','servicio-redondo','otro'].includes(tipo);
  const esPrecioLibre = ['servicio-redondo','otro'].includes(tipo);

  const horasGroup       = document.getElementById('horas-group');
  const horaRegresoGroup = document.getElementById('hora-regreso-group');
  const origenLibreGroup = document.getElementById('origen-libre-group');
  const destinoSelect    = document.getElementById('destino-select-group');
  const destinoText      = document.getElementById('destino-text-group');
  const btnCalcular      = document.getElementById('btn-calcular');

  horasGroup.style.display        = tipo==='servicio-abierto' ? '' : 'none';
  horaRegresoGroup.style.display  = tipo==='servicio-redondo' ? '' : 'none';
  origenLibreGroup.style.display  = tipo==='otro' ? '' : 'none';
  destinoSelect.style.display     = esTextoLibre ? 'none' : '';
  destinoText.style.display       = esTextoLibre ? '' : 'none';
  if (btnCalcular) btnCalcular.style.display = esPrecioLibre ? 'none' : '';

  recalcPrice();
}

function recalcPrice() {
  const tipo    = document.getElementById('f-tipo')?.value;
  // precio libre: no auto-calc, leave user-entered price untouched
  if (['servicio-redondo','otro'].includes(tipo)) return;
  const vSelect  = document.getElementById('f-vehiculo');
  const vRaw     = vSelect?.value || '';
  const vTipo    = vRaw === 'van' ? 'van8' : vRaw;
  const esTextoLibre = ['servicio-abierto','servicio-redondo','otro'].includes(tipo);
  const destino  = esTextoLibre
    ? document.getElementById('f-destino-text')?.value || ''
    : document.getElementById('f-destino')?.value || '';
  const horas    = parseInt(document.getElementById('f-horas')?.value) || 3;

  const precio   = calcPrice(destino, vTipo, tipo, horas);
  if (precio === null) return; // precio libre
  const input    = document.getElementById('f-precio');
  const display  = document.getElementById('priceDisplay');
  if (input)   input.value   = precio;
  if (display) display.textContent = fmxn(precio);
}

function updatePriceDisplay() {
  const val = parseFloat(document.getElementById('f-precio')?.value)||0;
  const display = document.getElementById('priceDisplay');
  if (display) display.textContent = fmxn(val);
}

async function saveBooking(editId=null) {
  const tipo    = document.getElementById('f-tipo')?.value;
  const nombre  = document.getElementById('f-nombre')?.value?.trim();
  const fecha   = document.getElementById('f-fecha')?.value;
  const vehiculoTipo = document.getElementById('f-vehiculo')?.value || '';

  if (!nombre) { showToast('Nombre del huésped requerido','error'); return; }
  if (!fecha)  { showToast('Fecha requerida','error'); return; }

  const esTextoLibre = ['servicio-abierto','servicio-redondo','otro'].includes(tipo);
  const esOtro       = tipo === 'otro';

  // Origen: tipo=otro → f-origen-libre; resto = origenTipo dropdown (con posible texto libre)
  let origenTipo, origenFinal;
  if (esOtro) {
    origenTipo  = 'OTRO';
    origenFinal = document.getElementById('f-origen-libre')?.value?.trim() || '';
  } else {
    origenTipo  = document.getElementById('f-origen-tipo')?.value || '';
    const origenTexto = document.getElementById('f-origen-texto')?.value || '';
    origenFinal = origenTipo === 'OTRO' ? origenTexto : origenTipo;
  }

  // Destino: texto libre para servicio-abierto / redondo / otro
  const destino = esTextoLibre
    ? document.getElementById('f-destino-text')?.value || ''
    : document.getElementById('f-destino')?.value || '';

  const body = {
    huespedNombre:   nombre,
    huespedTelefono: document.getElementById('f-telefono')?.value||'',
    huespedEmail:    document.getElementById('f-email')?.value||'',
    habitacion:      document.getElementById('f-habitacion')?.value?.trim()||'',
    referido:        document.getElementById('f-referido')?.value?.trim()||'',
    tipoServicio:    tipo,
    origenTipo,
    origen:          origenFinal,
    origenTitulo:    document.getElementById('f-origen-titulo')?.value?.trim()||'',
    destino,
    horaRegreso:     tipo==='servicio-redondo' ? document.getElementById('f-hora-regreso')?.value||'' : '',
    fecha,
    hora:            document.getElementById('f-hora')?.value||'',
    pasajeros:       parseInt(document.getElementById('f-pasajeros')?.value)||1,
    numeroVuelo:     document.getElementById('f-vuelo')?.value||'',
    vehiculoId:      '',
    vehiculoTipo:    vehiculoTipo,
    driverId:        document.getElementById('f-conductor')?.value||'',
    precio:          parseFloat(document.getElementById('f-precio')?.value)||0,
    horas:           tipo==='servicio-abierto' ? parseInt(document.getElementById('f-horas')?.value)||3 : 0,
    metodoPago:      document.getElementById('f-metodo-pago')?.value||'',
    estatusPago:     document.getElementById('f-pago')?.value||'pagado',
    notas:           document.getElementById('f-notas')?.value||'',
  };

  try {
    if (editId) {
      await PUT(`/api/bookings/${editId}`, body);
      showToast('Reservación actualizada ✅','success');
    } else {
      await POST('/api/bookings', body);
      showToast('Reservación creada ✅','success');
    }
    navigate('calendario');
  } catch(e) { showToast(e.message,'error'); }
}

let driverStatusInterval = null;
let dashboardInterval    = null;

async function renderEstadoDrivers() {
  document.getElementById('topbarActions').innerHTML = '';
  const vc = document.getElementById('viewContainer');
  vc.innerHTML = `<div id="driversStatusGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px"></div>`;
  clearInterval(driverStatusInterval);
  await loadDriverStatus();
  driverStatusInterval = setInterval(loadDriverStatus, 30000);
}

async function loadDriverStatus() {
  try {
    const drivers = await GET('/api/drivers');
    if (!drivers) return;
    const grid = document.getElementById('driversStatusGrid');
    if (!grid) { clearInterval(driverStatusInterval); return; }

    // ORDEN DINÁMICO V2.7:
    // 1. Drivers disponibles/pendientes/en-hotel ordenados por hora de entrada (primero en checar = primero en lista)
    // 2. En servicio → al final
    // 3. No ha checado → al final del todo
    drivers.sort((a, b) => {
      const aFin = (a.estado === 'en-servicio') ? 1 : (a.noHaChecado ? 2 : 0);
      const bFin = (b.estado === 'en-servicio') ? 1 : (b.noHaChecado ? 2 : 0);
      if (aFin !== bFin) return aFin - bFin;
      // Mismo grupo: ordenar por hora de entrada
      if (a.checadaHoraEntrada && b.checadaHoraEntrada) {
        return a.checadaHoraEntrada.localeCompare(b.checadaHoraEntrada);
      }
      if (a.checadaHoraEntrada) return -1;
      if (b.checadaHoraEntrada) return 1;
      return (a.nombre || '').localeCompare(b.nombre || '');
    });

    grid.innerHTML = drivers.length === 0
      ? `<div class="empty-state"><div class="empty-icon">🚗</div><p>No hay drivers registrados</p></div>`
      : drivers.map((d, idx) => {
          const esServicio  = d.estado === 'en-servicio';
          const esPendiente = d.estado === 'pendiente';
          const esEnHotel   = d.estado === 'en-hotel';
          const esNoChecado = d.estado === 'no-checado' || d.noHaChecado;
          const statusColor = esServicio  ? 'var(--blue)'
                            : esPendiente ? 'var(--yellow)'
                            : esEnHotel   ? 'var(--pink)'
                            : esNoChecado ? 'var(--text-muted)'
                            : 'var(--green)';
          const statusTxt   = esServicio  ? 'En Servicio'
                            : esPendiente ? 'Próximo Servicio'
                            : esEnHotel   ? 'En Hotel'
                            : esNoChecado ? 'No Ha Checado'
                            : 'Disponible';
          const statusDot   = esServicio  ? 'en-camino'
                            : esPendiente ? 'pendiente'
                            : esEnHotel   ? 'en-hotel'
                            : esNoChecado ? 'no-show'
                            : 'completado';
          // Hora de entrada legible
          let horaEntrada = '';
          if (d.checadaHoraEntrada) {
            try {
              horaEntrada = new Date(d.checadaHoraEntrada).toLocaleTimeString('es-MX', {
                timeZone: 'America/Cancun', hour:'2-digit', minute:'2-digit', hour12:false
              });
            } catch(_) {}
          }
          return `
          <div class="card" style="border-left:3px solid ${statusColor}">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
              <div style="min-width:24px;height:24px;border-radius:50%;background:var(--pink-glow);color:var(--pink);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0" title="Posición en orden operativo">${idx+1}</div>
              <div style="width:42px;height:42px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--pink);flex-shrink:0">
                ${d.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:600;font-size:14px">${d.nombre}</div>
                <span class="badge badge-${statusDot}" style="font-size:11px">${statusTxt}</span>
                ${horaEntrada ? `<div style="font-size:10px;color:var(--text-muted);margin-top:3px">⏰ Entrada: ${horaEntrada}</div>` : ''}
              </div>
            </div>
            ${esServicio ? `
              <div style="background:var(--surface3);border-radius:8px;padding:10px 12px">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px">⏱ TIEMPO EN SERVICIO</div>
                <div style="font-size:22px;font-weight:800;color:var(--blue)">${d.minutos ?? 0} min</div>
                ${d.destino ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">📍 ${d.destino}</div>` : ''}
                ${d.refId ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">ID ${d.refId}</div>` : ''}
              </div>` : ''}
            ${esPendiente ? `
              <div style="background:rgba(245,158,11,.08);border-radius:8px;padding:10px 12px">
                <div style="font-size:11px;color:var(--yellow);margin-bottom:4px">🔔 SALIDA EN MENOS DE 1 HORA</div>
                ${d.destino ? `<div style="font-size:12px;color:var(--text-muted)">📍 ${d.destino}</div>` : ''}
                ${d.refId ? `<div style="font-size:11px;color:var(--text-muted);margin-top:2px">ID ${d.refId}</div>` : ''}
              </div>` : ''}
            ${esEnHotel ? `
              <div style="background:rgba(234,20,129,.06);border-radius:8px;padding:10px 12px">
                <div style="font-size:11px;color:var(--pink)">🏨 Driver reportado en hotel</div>
              </div>` : ''}
            ${esNoChecado ? `
              <div style="background:rgba(107,114,128,.08);border-radius:8px;padding:10px 12px">
                <div style="font-size:11px;color:var(--text-muted)">⚠️ Sin registro de entrada hoy</div>
              </div>` : ''}
            ${['admin_unico','admin','coordinador'].includes(S.user.rol) ? `
            <div style="margin-top:12px;border-top:1px solid var(--border);padding-top:10px">
              <div style="font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Override manual</div>
              <div class="driver-override-btns" style="display:flex;gap:6px;flex-wrap:wrap">
                <button class="btn btn-sm" style="font-size:11px;padding:4px 8px;background:rgba(37,99,235,.1);color:var(--blue);border:1px solid rgba(37,99,235,.2);border-radius:6px" onclick="overrideDriverEstado('${d.id}','en-servicio')">🚗 En Servicio</button>
                <button class="btn btn-sm" style="font-size:11px;padding:4px 8px;background:rgba(22,163,74,.1);color:var(--green);border:1px solid rgba(22,163,74,.2);border-radius:6px" onclick="overrideDriverEstado('${d.id}','disponible')">✅ Disponible</button>
                <button class="btn btn-sm" style="font-size:11px;padding:4px 8px;background:rgba(234,20,129,.08);color:var(--pink);border:1px solid rgba(234,20,129,.2);border-radius:6px" onclick="overrideDriverEstado('${d.id}','en-hotel')">🏨 En Hotel</button>
                <button class="btn btn-sm" style="font-size:11px;padding:4px 8px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);border-radius:6px" onclick="overrideDriverEstado('${d.id}','')" title="Quitar override">↺ Limpiar</button>
              </div>
            </div>` : ''}
          </div>`;
        }).join('');
  } catch(e) { /* silencioso */ }
}

async function overrideDriverEstado(driverId, estado) {
  try {
    // Si estado está vacío, enviar null para limpiar el override
    const payload = { manualEstado: estado || null };
    await PUT(`/api/drivers/${driverId}/estado`, payload);
    const labels = { 'en-servicio':'En Servicio', 'disponible':'Disponible', 'en-hotel':'En Hotel', '':'Override limpiado' };
    showToast(`Estado actualizado: ${labels[estado] ?? estado}`, 'success');
    await loadDriverStatus();
  } catch(e) { showToast('Error actualizando estado: ' + (e.message||''),'error'); }
}

async function renderMisViajes() {
  document.getElementById('topbarActions').innerHTML = '';
  const vc = document.getElementById('viewContainer');
  vc.innerHTML = `
    <div class="filters-bar">
      <select id="viajeFilter" onchange="loadMisViajes()">
        <option value="hoy">Hoy</option>
        <option value="proximos">Próximos 7 días</option>
        <option value="todos">Todos</option>
      </select>
    </div>
    <div id="misViajesList"><div style="color:var(--text-muted)">Cargando…</div></div>`;
  await loadMisViajes();
}

async function loadMisViajes() {
  const filter   = document.getElementById('viajeFilter')?.value || 'hoy';
  const todayStr = today();
  let bkUrl = '/api/bookings';
  let wUrl  = '/api/welcomes';
  if (filter === 'hoy') { bkUrl += `?fecha=${todayStr}`; wUrl += `?fecha=${todayStr}`; }
  try {
    let [bks, wels] = await Promise.all([ GET(bkUrl), GET(wUrl) ]);
    bks  = (bks  || []).map(b => ({ ...b, _type:'booking' }));
    wels = (wels || []).map(w => ({ ...w, _type:'welcome' }));
    let items = [...bks, ...wels];
    if (filter === 'proximos') {
      const limitMs  = new Date().getTime() + 7 * 86400000;
      const limitStr = new Intl.DateTimeFormat('en-CA', {timeZone: CANCUN_TZ}).format(new Date(limitMs));
      items = items.filter(x => x.fecha >= todayStr && x.fecha <= limitStr);
    }
    items.sort((a, b) => {
      const da = (a.fecha||'') + (a.hora||'00:00');
      const db = (b.fecha||'') + (b.hora||'00:00');
      return da.localeCompare(db);
    });
    const list = document.getElementById('misViajesList');
    if (!list) return;
    list.innerHTML = items.length === 0
      ? `<div class="empty-state"><div class="empty-icon">🗺️</div><p>Sin viajes asignados</p></div>`
      : items.map(item => item._type === 'welcome' ? welcomeTripCard(item) : tripCard(item)).join('');
  } catch(e) { showToast('Error','error'); }
}

  return `
    <div class="trip-card status-${b.estatusViaje}" id="trip-${b.id}">
      <div class="trip-header">
        <div>
          <div class="trip-guest">${b.huespedNombre||'Sin nombre'} <span style="color:var(--text-muted);font-size:11px;font-weight:400">#${b.bookingId||'—'}</span></div>
          <div class="trip-datetime">${fdate(b.fecha)} — ${b.hora||'--:--'} — ${servicioLabel(b.tipoServicio)}</div>
        </div>
        ${badge(b.estatusViaje)}
      </div>
      <div class="trip-info-grid">
        <div class="trip-info-item"><label>Origen</label><p>${b.origenTipo||b.origen||'—'}${b.origenFinal?' — '+b.origenFinal:''}</p></div>
        <div class="trip-info-item"><label>Destino</label><p>${b.destino||'—'}</p></div>
        <div class="trip-info-item"><label>Pasajeros</label><p>${b.pasajeros} pax</p></div>
        <div class="trip-info-item"><label>Vehículo</label><p>${b.vehiculoNombre||'—'}</p></div>
        <div class="trip-info-item"><label>No. de Vuelo</label><p>${b.numeroVuelo||'—'}</p></div>
        <div class="trip-info-item"><label>Teléfono</label><p>${b.huespedTelefono||b.huespedContacto||'—'}</p></div>
        ${b.huespedEmail?`<div class="trip-info-item"><label>Email</label><p>${b.huespedEmail}</p></div>`:''}
      </div>
      ${b.notas?`<div class="trip-notes">📝 ${b.notas}</div>`:''}
      ${isActive?`
        <div class="trip-actions">

async function updateTripStatus(id, status, type='booking') {
  try {
    // V2.7 — Si iniciando un nuevo servicio (en-camino), auto-completar cualquier servicio activo anterior
    if (status === 'en-camino') {
      try {
        const [allBks, allWels] = await Promise.all([GET('/api/bookings'), GET('/api/welcomes')]);
        const activos = [
          ...((allBks||[]).filter(b => b.estatusViaje === 'en-camino' && b.id !== id).map(b => ({...b, _t:'booking'}))),
          ...((allWels||[]).filter(w => w.estatusViaje === 'en-camino' && w.id !== id).map(w => ({...w, _t:'welcome'})))
        ];
        for (const prev of activos) {
          const prevUrl = prev._t === 'welcome' ? `/api/welcomes/${prev.id}` : `/api/bookings/${prev.id}`;
          try { await PUT(prevUrl, { estatusViaje: 'completado' }); } catch(_) {}
        }
      } catch(_) {}
    }
    const apiUrl = type === 'welcome' ? `/api/welcomes/${id}` : `/api/bookings/${id}`;
    await PUT(apiUrl, { estatusViaje: status });
    showToast(`Estatus actualizado: ${statusLabel(status)}`, 'success');
    await loadMisViajes();
  } catch(e) { showToast(e.message,'error'); }
}

// V2.7 — "YA EN EL HOTEL": completa el servicio actual y marca al driver como disponible
async function yaEnElHotel(id, type='booking') {
  try {
    const apiUrl = type === 'welcome' ? `/api/welcomes/${id}` : `/api/bookings/${id}`;
    // 1. Completar el servicio actual
    await PUT(apiUrl, { estatusViaje: 'completado' });
    // 2. Marcar al driver como disponible (sincroniza con Estado de Drivers y sistema de asignación)
    try { await POST('/api/drivers/me/disponible', {}); } catch(_) {}
    showToast('🏨 Ya en el hotel — Estado: Disponible', 'success');
    await loadMisViajes();
  } catch(e) { showToast(e.message, 'error'); }
}

async function saveWelcome(editId=null) {
  const nombre   = document.getElementById('wf-nombre')?.value?.trim();
  const fecha    = document.getElementById('wf-fecha')?.value;
  const hora     = document.getElementById('wf-hora')?.value    || '';
  const invit    = document.getElementById('wf-invitacion')?.value?.trim() || '';
  const destino  = document.getElementById('wf-destino')?.value?.trim()   || '';
  const costo    = parseFloat(document.getElementById('wf-costo')?.value) || 0;
  const driverId = document.getElementById('wf-driver')?.value  || '';
  const folio    = document.getElementById('wf-folio')?.value?.trim()     || '';
  if (!nombre) { showToast('Nombre requerido','error'); return; }
  if (!fecha)  { showToast('Fecha requerida','error');  return; }

  // Validar duplicados de folio y número de invitación
  try {
    const todos = (await GET('/api/welcomes')) || [];
    const otros = editId ? todos.filter(w => w.id !== editId) : todos;
    if (folio && otros.some(w => w.folio && w.folio.toLowerCase() === folio.toLowerCase())) {
      showToast('❌ El folio ya existe en otro registro Welcome', 'error'); return;
    }
    if (invit && otros.some(w => w.numeroInvitacion && w.numeroInvitacion === invit)) {
      showToast('❌ El número de invitación ya existe en otro registro Welcome', 'error'); return;
    }
  } catch(e) { /* si falla la verificación, continuar */ }

  const body = { nombre, fecha, hora, numeroInvitacion:invit, destino, costo, driverId, folio };
  try {
    if (editId) {
      await PUT(`/api/welcomes/${editId}`, body);
      showToast('Welcome actualizado ✅','success');
    } else {
      await POST('/api/welcomes', body);
      showToast('Welcome creado ✅','success');
    }
    navigate('reservaciones');
  } catch(e) { showToast(e.message,'error'); }
}

async function saveVehiculo(id) {
  const nombre    = document.getElementById('vm-nombre')?.value?.trim();
  const tipo      = document.getElementById('vm-tipo')?.value || '';
  const capacidad = parseInt(document.getElementById('vm-capacidad')?.value) || 0;
  const placa     = document.getElementById('vm-placa')?.value?.trim().toUpperCase();
  if (!nombre) { showToast('Nombre requerido','error'); return; }
  try {
    await PUT(`/api/vehicles/${id}`, { nombre, tipo, capacidad, placa });
    showToast('Vehículo actualizado ✅','success');
    closeModal();
    renderVehiculos();
  } catch(e) { showToast(e.message,'error'); }
}

        </div>
      </div>`;

  } else if (estado === 'denegado') {
    // Detectar si es iOS o Android para dar instrucciones específicas
    const esIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    const esAndroid = /Android/.test(navigator.userAgent);
    let instrucciones = '';
    if (esIOS) {
      instrucciones = '<strong>iOS:</strong> Configuración → Safari → Ubicación → Permitir';
    } else if (esAndroid) {
      instrucciones = '<strong>Android:</strong> Toca el ícono 🔒 junto a la URL → Permisos → Ubicación → Permitir';
    } else {
      instrucciones = 'Haz clic en el ícono 🔒 o 🌐 junto a la URL del navegador → Permisos de ubicación → Permitir';
    }
    banner.innerHTML = `
      <div style="${estiloBase}background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.25);color:var(--red);flex-direction:column;gap:8px">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <span style="font-size:20px;flex-shrink:0">🚫</span>
          <div>
            <div style="font-size:13px">Acceso a ubicación denegado</div>
            <div style="font-size:11px;font-weight:400;color:var(--text-muted);margin-top:3px">
              El GPS es obligatorio para registrar la checada. Por favor actívalo:
            </div>
          </div>
        </div>
        <div style="background:rgba(220,38,38,.06);border-radius:7px;padding:8px 10px;font-size:11px;font-weight:500;color:#7f1d1d;line-height:1.6">
          ${instrucciones}
        </div>
        <button onclick="_ckSolicitarGPS()" style="width:100%;padding:10px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">
          📍 Reintentar — Compartir Ubicación
        </button>
      </div>`;

  } else if (estado === 'timeout') {
    banner.innerHTML = `
      <div style="${estiloBase}background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);color:var(--yellow);flex-direction:column;gap:8px">
        <div style="display:flex;align-items:flex-start;gap:10px">
          <span style="font-size:20px;flex-shrink:0">⏱</span>

            </div>

function _ckSolicitarGPS() {
  if (!navigator.geolocation) {
    S._ckLat = null; S._ckLng = null; S._ckAccuracy = null;
    _ckSetGpsBanner('no-soportado');
    return;
  }

  _ckSetGpsBanner('buscando');
  S._ckLat = null; S._ckLng = null; S._ckAccuracy = null;

  navigator.geolocation.getCurrentPosition(
    pos => {
      const { latitude: lat, longitude: lng, accuracy } = pos.coords;
      S._ckLat = lat; S._ckLng = lng; S._ckAccuracy = accuracy;
      _ckSetGpsBanner('ok', `${lat.toFixed(5)}, ${lng.toFixed(5)} (±${Math.round(accuracy)} m)`);
    },
    err => {
      S._ckLat = null; S._ckLng = null; S._ckAccuracy = null;
      // err.code: 1=PERMISSION_DENIED, 2=POSITION_UNAVAILABLE, 3=TIMEOUT
      if (err.code === 1) {
        _ckSetGpsBanner('denegado');
      } else if (err.code === 3) {
        _ckSetGpsBanner('timeout');
      } else {
        _ckSetGpsBanner('timeout'); // POSITION_UNAVAILABLE → mismo flujo de reintento
      }
    },
    { timeout: 12000, enableHighAccuracy: true, maximumAge: 0 }
  );
}

      } else if (c.validacionEstado === 'fuera_de_zona') {

        badge = `<span style="display:inline-block;background:#f8d7da;color:#721c24;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:6px">✖ Fuera de zona${dist}</span>`;
      } else {

      }

          <div>
            <div style="display:flex;align-items:center">
              <span style="font-size:13px;font-weight:700;color:${color}">${icon} ${c.tipo}</span>

    }).join('');
  } catch(e) { if (box) box.innerHTML = `<div style="color:var(--red);font-size:13px">Error cargando historial</div>`; }
}

async function registrarChecada(tipo) {
  // ── GPS REQUERIDO ────────────────────────────────────────────
  if (S._ckLat == null || S._ckLng == null) {
    showToast('📍 Se requiere GPS activo para registrar. Activa la ubicación en tu dispositivo y espera unos segundos.', 'error');
    return;
  }

  const btnE = document.getElementById('btn-entrada');
  const btnS = document.getElementById('btn-salida');
  if (btnE) btnE.disabled = true;
  if (btnS) btnS.disabled = true;

  // Reverse geocode (Nominatim, sin API key)
  let locationStr = null;
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${S._ckLat}&lon=${S._ckLng}&format=json`);
    const j = await r.json();
    locationStr = j.display_name || null;
  } catch(_) {}

  try {
    const result = await POST('/api/checadas', {
      tipo,
      lat:      S._ckLat,
      lng:      S._ckLng,
      accuracy: S._ckAccuracy ?? null,
      locationStr
    });

    // Toast con resultado de validación de zona
    let msg = tipo === 'ENTRADA' ? '✅ Entrada registrada' : '🚪 Salida registrada';
    if (result.validacionEstado === 'valida') {
      msg += ' — ✔ En zona';
    } else if (result.validacionEstado === 'fuera_de_zona') {
      const dist = result.distanciaKm != null ? ` (${result.distanciaKm.toFixed(2)} km del punto)` : '';
      msg += ` — ✖ Fuera de zona${dist}`;
    }
    showToast(msg, 'success');
    await _loadChecadasDriver();
  } catch(e) {
    // Mostrar mensaje del servidor si hay (doble entrada, sin GPS, etc.)
    const msg = e.serverMsg || e.message || 'Error desconocido';
    showToast('⚠️ ' + msg, 'error');
  } finally {
    if (btnE) btnE.disabled = false;
    if (btnS) btnS.disabled = false;
  }
}

// Haversine distance in km
function _haversineKm(lat1, lng1, lat2, lng2) {
  const R   = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a   = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
